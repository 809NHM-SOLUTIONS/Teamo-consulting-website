<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Teamo Consulting</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter', sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                    url('/images/learners2.jpeg') center/cover no-repeat;
            padding:20px;
        }

        .login-container{
            width:100%;
            max-width:430px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:24px;
            padding:45px;
            box-shadow:0 10px 40px rgba(0,0,0,0.35);
            color:white;
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo img{
            width:95px;
            margin-bottom:12px;
        }

        .logo h1{
            font-size:28px;
            font-weight:700;
            margin-bottom:8px;
        }

        .logo p{
            color:#d1d5db;
            font-size:14px;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
            color:#f9fafb;
        }

        .form-group input{
            width:100%;
            padding:14px 16px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.12);
            color:white;
            font-size:15px;
            outline:none;
            transition:0.3s ease;
        }

        .form-group input::placeholder{
            color:#d1d5db;
        }

        .form-group input:focus{
            background:rgba(255,255,255,0.18);
            border:1px solid #14b8a6;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:#14b8a6;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
        }

        .login-btn:hover{
            background:#0f766e;
            transform:translateY(-2px);
        }

        .back-home{
            text-align:center;
            margin-top:22px;
        }

        .back-home a{
            color:#d1d5db;
            text-decoration:none;
            font-size:14px;
            transition:0.3s ease;
        }

        .back-home a:hover{
            color:white;
        }

        @media(max-width:500px){

            .login-container{
                padding:35px 25px;
            }

            .logo h1{
                font-size:24px;
            }

        }

    </style>
</head>

<body>

<div class="login-container">

    <div class="logo">
        <img src="/images/teamo trans logo.png" alt="Teamo Consulting Logo">

        <h1>Admin Portal</h1>

        <p>Secure access to testimonial management</p>
    </div>

    <form method="post" action="/admin-login">

        <div class="form-group">
            <label>Email Address</label>

            <input
                    type="email"
                    name="username"
                    placeholder="Enter admin email"
                    required
            >
        </div>

        <div class="form-group">
            <label>Password</label>

            <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required
            >
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="back-home">
        <a href="/">← Back to Website</a>
    </div>

</div>

</body>
</html>
